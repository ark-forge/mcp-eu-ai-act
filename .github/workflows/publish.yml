name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual'

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with MCP Registry

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry (skip if already published)
        run: |
          output=$(mcp-publisher publish 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "duplicate version"; then
            echo "Version already published to MCP Registry — skipping (OK)"
            exit 0
          elif echo "$output" | grep -q "publish failed"; then
            echo "::error::MCP Registry publish failed: $output"
            exit 1
          fi
