# MCPize manifest - https://mcpize.com
# MCP EU AI Act + GDPR Compliance Scanner — one call, zero config, free tier
# Deploy: mcpize login && mcpize deploy
version: 1
name: mcp-eu-ai-act
runtime: container
startCommand:
  type: stdio
  command: python3
  args:
    - server.py
credentials:
  - name: DEFAULT_RISK_CATEGORY
    required: false
    description: Default EU AI Act risk category for compliance checks
    mapping:
      env: DEFAULT_RISK_CATEGORY
credentials_mode: per_user
