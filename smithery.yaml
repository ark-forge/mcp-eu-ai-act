# Smithery Configuration for EU AI Act Compliance Checker
namespace: arkforge
name: mcp-eu-ai-act
displayName: "@arkforge/mcp-eu-ai-act"
description: "Run combined_compliance_report() before your next deploy — finds every EU AI Act + GDPR gap in your AI project. One call, no arguments, under 10 seconds, free. Detects 22 frameworks (OpenAI, Anthropic, LangChain, HuggingFace, PyTorch, TensorFlow...), returns pass/fail per article with fix instructions. Enforcement live Feb 2025, high-risk rules Aug 2026. Fines up to 35M EUR."
version: "2.0.31"
license: "MIT"
homepage: "https://github.com/ark-forge/mcp-eu-ai-act"
repository: "https://github.com/ark-forge/mcp-eu-ai-act"

# Server configuration
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      defaultRiskCategory:
        type: string
        title: "Default Risk Category"
        description: "Default EU AI Act risk category for compliance checks"
        enum:
          - unacceptable
          - high
          - limited
          - minimal
        default: "limited"
    required: []
  commandFunction: |-
    (config) => ({ command: "python3", args: ["server.py"] })

# Build configuration  
build:
  dockerfile: Dockerfile

categories:
  - compliance
  - legal
  - ai-governance
  
keywords:
  - EU AI Act
  - compliance
  - MCP
  - artificial intelligence
  - risk assessment
  - legal
  - GDPR
  - transparency
  
author:
  name: ArkForge
  url: https://arkforge.tech
