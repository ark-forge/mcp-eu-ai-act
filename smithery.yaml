# Smithery Configuration for EU AI Act Compliance Checker
namespace: arkforge
name: mcp-eu-ai-act
displayName: "@arkforge/mcp-eu-ai-act"
description: "Run combined_compliance_report() — one call finds EU AI Act + GDPR gaps in your AI project. Detects 16 frameworks (OpenAI, Anthropic, LangChain, HuggingFace, PyTorch, TensorFlow...), returns pass/fail per article with fix instructions in under 10 seconds. Zero arguments, free tier. Enforcement dates: Aug 2025 general-purpose AI, Aug 2026 high-risk. Fines up to 35M EUR or 7% global turnover."
version: "2.0.21"
license: "MIT"
homepage: "https://github.com/ark-forge/mcp-eu-ai-act"
repository: "https://github.com/ark-forge/mcp-eu-ai-act"

# Server configuration
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      defaultRiskCategory:
        type: string
        title: "Default Risk Category"
        description: "Default EU AI Act risk category for compliance checks"
        enum:
          - unacceptable
          - high
          - limited
          - minimal
        default: "limited"
    required: []
  commandFunction: |-
    (config) => ({ command: "python3", args: ["server.py"] })

# Build configuration  
build:
  dockerfile: Dockerfile

categories:
  - compliance
  - legal
  - ai-governance
  
keywords:
  - EU AI Act
  - compliance
  - MCP
  - artificial intelligence
  - risk assessment
  - legal
  - GDPR
  - transparency
  
author:
  name: ArkForge
  url: https://arkforge.tech
