# Smithery Configuration for EU AI Act Compliance Checker
namespace: arkforge
name: mcp-eu-ai-act
displayName: "@arkforge/mcp-eu-ai-act"
description: "EU AI Act + GDPR compliance scanner for AI/ML projects. Detects OpenAI, Anthropic, LangChain, HuggingFace, PyTorch, TensorFlow imports and maps each to legal obligations. Use when: your project imports AI/ML libraries, you need compliance checks before deployment, or you are preparing for EU AI Act enforcement (Aug 2025 general-purpose, Aug 2026 high-risk). No arguments needed, no API key for free tier."
version: "2.0.17"
license: "MIT"
homepage: "https://github.com/ark-forge/mcp-eu-ai-act"
repository: "https://github.com/ark-forge/mcp-eu-ai-act"

# Server configuration
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      defaultRiskCategory:
        type: string
        title: "Default Risk Category"
        description: "Default EU AI Act risk category for compliance checks"
        enum:
          - unacceptable
          - high
          - limited
          - minimal
        default: "limited"
    required: []
  commandFunction: |-
    (config) => ({ command: "python3", args: ["server.py"] })

# Build configuration  
build:
  dockerfile: Dockerfile

categories:
  - compliance
  - legal
  - ai-governance
  
keywords:
  - EU AI Act
  - compliance
  - MCP
  - artificial intelligence
  - risk assessment
  - legal
  - GDPR
  - transparency
  
author:
  name: ArkForge
  url: https://arkforge.tech
